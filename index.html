<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirPRO — GitHub Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root { --bg: #050508; --gold: #FFC107; --card: #0f0f18; --text: #fff; --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; }
        .container { max-width: 480px; margin: auto; padding: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 18px; font-weight: 900; cursor: pointer; font-size: 16px; }
        .btn:disabled { background: #1d1d2b; color: #444; cursor: not-allowed; }
        input { width: 100%; padding: 16px; margin: 15px 0; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: #181825; color: #fff; outline: none; text-align: center; }
        header { padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5,5,8,0.9); backdrop-filter: blur(10px); z-index: 100; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0f; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border); }
        .tab { display: none; } .active { display: block; }
        .g-recaptcha { display: flex; justify-content: center; margin: 15px 0; transform: scale(0.9); }
    </style>
</head>
<body>

<div id="auth-screen" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    <div class="card">
        <h1 style="color:var(--gold); margin:0; font-size: 35px; font-weight: 900;">NoirPRO</h1>
        <p style="opacity: 0.6; font-size: 13px;">FaucetPay Girişi</p>
        <input type="email" id="fp-email" placeholder="Email daxil edin">
        <button class="btn" onclick="login()">DAXİL OL</button>
    </div>
</div>

<div id="app-content" style="display:none;">
    <header>
        <span style="font-weight:900; color:var(--gold)">NoirPRO</span>
        <span style="font-weight:800; color:var(--gold)">💰 <span id="userBal">0.00</span> DGB</span>
    </header>

    <div class="container">
        <div id="home-tab" class="tab active">
            <div class="card">
                <h1 id="timer" style="color:var(--gold); font-size:60px; margin:10px 0;">05:00</h1>
                <div class="g-recaptcha" data-sitekey="6Ld0hNgsAAAAACuV-Gi5GQUE9EuJDV3QXu-Y9U8E" data-theme="dark"></div>
                <button id="claimBtn" class="btn" onclick="verifyAndClaim()">0.05 DGB GÖTÜR</button>
            </div>
        </div>

        <div id="wd-tab" class="tab">
            <div class="card">
                <h3>Çıxarış</h3>
                <h2 id="wdBal" style="color:var(--gold); font-size: 32px;">0.00 DGB</h2>
                <button class="btn" onclick="requestWD()">İSTƏK GÖNDƏR</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <span onclick="showTab('home-tab')" style="cursor:pointer; font-size: 22px;">🏠</span>
        <span onclick="showTab('wd-tab')" style="cursor:pointer; font-size: 22px;">💳</span>
        <span onclick="logout()" style="cursor:pointer; font-size: 22px;">🚪</span>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs",
  authDomain: "faucetfirex.firebaseapp.com",
  projectId: "faucetfirex",
  storageBucket: "faucetfirex.firebasestorage.app",
  messagingSenderId: "191065358342",
  appId: "1:191065358342:web:b9911c6e71b9fc4b254387"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(), auth = firebase.auth();
let currentEmail = localStorage.getItem("fp_email");

async function login() {
    const email = document.getElementById('fp-email').value;
    if(!email.includes("@")) return alert("Düzgün email!");
    localStorage.setItem("fp_email", email);
    await auth.signInAnonymously();
    location.reload();
}

function logout() { localStorage.clear(); auth.signOut(); location.reload(); }

auth.onAuthStateChanged(user => {
    if (user && currentEmail) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        db.collection("users").doc(currentEmail).onSnapshot(doc => {
            if (doc.exists) {
                const bal = doc.data().tarazlıq || 0;
                document.getElementById('userBal').innerText = bal.toFixed(2);
                document.getElementById('wdBal').innerText = bal.toFixed(2) + " DGB";
                updateTimer(doc.data().son_faucet || 0);
            } else db.collection("users").doc(currentEmail).set({ tarazlıq: 0, son_faucet: 0 });
        });
    }
});

async function verifyAndClaim() {
    if(grecaptcha.getResponse().length == 0) return alert("Robot testi!");
    await db.collection("users").doc(currentEmail).update({ 
        tarazlıq: firebase.firestore.FieldValue.increment(0.05),
        son_faucet: Date.now() 
    });
    grecaptcha.reset();
    alert("0.05 DGB əlavə edildi!");
}

async function requestWD() {
    const doc = await db.collection("users").doc(currentEmail).get();
    const bal = doc.data().tarazlıq || 0;
    if(bal < 10) return alert("Limit 10 DGB-dir!");
    await db.collection("withdraw_requests").add({ email: currentEmail, miqdar: bal, tarix: new Date().toLocaleString() });
    await db.collection("users").doc(currentEmail).update({ tarazlıq: 0 });
    alert("Sorğu göndərildi!");
}

function showTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function updateTimer(last) {
    const tick = setInterval(() => {
        const diff = (5 * 60 * 1000) - (Date.now() - last);
        const btn = document.getElementById('claimBtn'), txt = document.getElementById('timer'), cap = document.querySelector('.g-recaptcha');
        if (diff <= 0) { btn.disabled = false; txt.innerText = "HAZIR"; cap.style.visibility = "visible"; clearInterval(tick); }
        else { btn.disabled = true; cap.style.visibility = "hidden";
            const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
            txt.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }, 1000);
}
</script>
</body>
</html>
