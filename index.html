<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirFaucet PRO — Üzv Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --card: #0f0f18;
            --gold: #FFC107;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --grad: linear-gradient(135deg, #FFC107, #FF8F00);
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        /* Giriş Ekranı */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 45px 30px; border-radius: 40px; width: 100%; max-width: 400px;
            text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        /* Əsas UI */
        #app-content { display: none; }
        header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(5,5,8,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .balance-badge { background: rgba(255,193,7,0.1); padding: 8px 18px; border-radius: 14px; border: 1px solid rgba(255,193,7,0.2); font-weight: 800; color: var(--gold); }

        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 30px 20px; text-align: center; margin-bottom: 20px; }

        .btn-main { background: var(--grad); border: none; padding: 18px; width: 100%; border-radius: 18px; font-weight: 900; color: #000; cursor: pointer; font-size: 15px; }
        .btn-google { background: #fff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 25px; }
        .btn-action { background: var(--gold); color: #000; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 12px; }

        /* List Styling */
        .list-box { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 16px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 10px; text-align: left; }
        
        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0a0a0f; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border); }
        .nav-item { color: #555; text-decoration: none; font-size: 10px; text-align: center; cursor: pointer; font-weight: 800; }
        .nav-item.active { color: var(--gold); }

        /* Toast & Overlay */
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 800; display: none; z-index: 10001; }
        #ptc-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }

        .tab { display: none; }
        .tab.active { display: block; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="auth-screen">
    <div class="auth-card">
        <div style="font-size: 35px; font-weight: 900; color: var(--gold); margin-bottom: 10px;">NoirPRO</div>
        <p style="color: #8e8e9e; font-size: 14px; margin-bottom: 30px;">Qazanmaq üçün şəxsi hesabınıza giriş edin.</p>
        <button class="btn-main btn-google" onclick="handleAuth()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            GOOGLE İLƏ ÜZV OL
        </button>
    </div>
</div>

<div id="app-content">
    <div id="ptc-overlay">
        <div id="ptc-timer" style="font-size: 80px; font-weight: 900; color: var(--gold);">10</div>
        <p style="font-weight:800;">REKLAM YOXLANILIR...</p>
    </div>

    <header>
        <div style="font-weight: 900; color: var(--gold);">NoirPRO</div>
        <div class="balance-badge">💰 <span id="topBalance">0.00</span></div>
    </header>

    <div class="container">
        <div id="faucet-tab" class="tab active">
            <div class="card">
                <h2>Manual Claim</h2>
                <div id="faucetTimer" style="font-size: 50px; font-weight: 900; color: var(--gold); margin: 20px 0;">05:00</div>
                <button class="btn-main" id="claimBtn" onclick="claimToken()">TOKENLƏRİ GÖTÜR</button>
            </div>
        </div>

        <div id="ptc-tab" class="tab">
            <div class="card">
                <h2>PTC Reklamları</h2>
                <div id="ptc-list"></div>
            </div>
        </div>

        <div id="links-tab" class="tab">
            <div class="card">
                <h2>Shortlinks</h2>
                <div id="sl-list"></div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('faucet-tab', this)">🏠<br>GÖTÜR</div>
        <div class="nav-item" onclick="showTab('ptc-tab', this)">👁️<br>PTC</div>
        <div class="nav-item" onclick="showTab('links-tab', this)">🔗<br>LİNKLƏR</div>
        <div class="nav-item" onclick="logout()">🚪<br>ÇIXIŞ</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
// FIREBASE AYARLARI
const firebaseConfig = {
  apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs",
  authDomain: "faucetfirex.firebaseapp.com",
  projectId: "faucetfirex",
  storageBucket: "faucetfirex.firebasestorage.app",
  messagingSenderId: "191065358342",
  appId: "1:191065358342:web:b9911c6e71b9fc4b254387"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let user = null;
let lastClaim = 0;

// *** REKLAM PANELİ (BURADAN DƏYİŞ) ***
const myPTC = [
    { name: "Sponsor Ad #1", reward: 25, sec: 15, url: "REKLAM_LİNKİ_1" },
    { name: "Sponsor Ad #2", reward: 20, sec: 10, url: "REKLAM_LİNKİ_2" }
];

const mySL = [
    { name: "Keçid #1", reward: 50, url: "REKLAM_LİNKİ_3" },
    { name: "Keçid #2", reward: 60, url: "REKLAM_LİNKİ_4" }
];

// FUNKSİYALAR
function handleAuth() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function logout() { auth.signOut().then(() => location.reload()); }
function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }

auth.onAuthStateChanged(u => {
    user = u;
    if (u) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        db.collection("users").doc(u.uid).onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('topBalance').innerText = (data.tarazlıq || 0).toFixed(2);
                lastClaim = data.son_İddia || 0;
                startFaucetTimer();
            } else {
                db.collection("users").doc(u.uid).set({ tarazlıq: 0, son_İddia: 0 });
            }
        });
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app-content').style.display = 'none';
    }
});

function showTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active'); el.classList.add('active');
    if(id === 'ptc-tab') renderPTC();
    if(id === 'links-tab') renderSL();
}

function renderPTC() {
    const cont = document.getElementById('ptc-list');
    cont.innerHTML = myPTC.map(ad => `
        <div class="list-box">
            <div><div class="info-title">${ad.name}</div><div style="color:var(--gold); font-size:12px">+${ad.reward} Token | ${ad.sec}s</div></div>
            <button class="btn-action" onclick="startPTC('${ad.url}', ${ad.reward}, ${ad.sec})">İZLƏ</button>
        </div>`).join('');
}

function renderSL() {
    const cont = document.getElementById('sl-list');
    cont.innerHTML = mySL.map(sl => `
        <div class="list-box">
            <div><div class="info-title">${sl.name}</div><div style="color:var(--gold); font-size:12px">+${sl.reward} Token</div></div>
            <button class="btn-action" onclick="window.open('${sl.url}','_blank'); addReward(${sl.reward})">KEÇ</button>
        </div>`).join('');
}

async function startPTC(url, reward, sec) {
    window.open(url, '_blank');
    const overlay = document.getElementById('ptc-overlay');
    const timerDisp = document.getElementById('ptc-timer');
    overlay.style.display = "flex";
    let left = sec; timerDisp.innerText = left;
    const interval = setInterval(async () => {
        left--; timerDisp.innerText = left;
        if(left <= 0) {
            clearInterval(interval); overlay.style.display = "none";
            await addReward(reward);
            showToast(`+${reward} Token qazandınız!`);
        }
    }, 1000);
}

async function addReward(amt) {
    await db.collection("users").doc(user.uid).update({ tarazlıq: firebase.firestore.FieldValue.increment(amt) });
}

async function claimToken() {
    await db.collection("users").doc(user.uid).update({ tarazlıq: firebase.firestore.FieldValue.increment(10), son_İddia: Date.now() });
    showToast("+10 Token balansınıza əlavə edildi!");
}

function startFaucetTimer() {
    const btn = document.getElementById('claimBtn');
    const disp = document.getElementById('faucetTimer');
    const tick = setInterval(() => {
        const diff = (5 * 60 * 1000) - (Date.now() - lastClaim);
        if (diff <= 0) { btn.disabled = false; disp.innerText = "HAZIR"; clearInterval(tick); }
        else {
            btn.disabled = true;
            const m = Math.floor(diff / 60000); const s = Math.floor((diff % 60000) / 1000);
            disp.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }, 1000);
}
</script>

<script src="https://pl29329349.profitablecpmratenetwork.com/aa/69/69/aa696903b4f2d1329390ab3ebd1dc84a.js"></script>

</body>
</html>
