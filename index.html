<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirPRO — Premium Faucet & Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --gold: #FFC107; --card: #0f0f18; --text: #fff; --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* UI Komponentləri */
        .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 35px; width: 100%; max-width: 380px; border: 1px solid var(--border); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 16px; margin: 15px 0; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: #12121f; color: #fff; outline: none; text-align: center; font-size: 15px; }
        #app-content { display: none; }
        
        header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5,5,8,0.9); backdrop-filter: blur(12px); z-index: 1000; }
        .bal-badge { background: rgba(255,193,7,0.1); padding: 8px 16px; border-radius: 14px; color: var(--gold); font-weight: 800; border: 1px solid rgba(255,193,7,0.2); }
        
        .container { max-width: 480px; margin: auto; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border); margin-bottom: 18px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .btn { background: linear-gradient(135deg, #FFC107, #FF8F00); color: #000; border: none; padding: 18px; width: 100%; border-radius: 18px; font-weight: 900; cursor: pointer; font-size: 16px; }
        .btn:disabled { background: #1d1d2b; color: #444; opacity: 0.5; cursor: not-allowed; }
        
        /* Kapça və Taymer */
        #math-box { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 25px; margin: 15px 0; border: 1px dashed var(--border); display: none; }
        .math-text { font-size: 32px; font-weight: 900; color: var(--gold); margin-bottom: 12px; }
        .math-input { width: 140px; font-size: 22px; font-weight: bold; border: 2px solid var(--gold); background: #000; color: #fff; text-align: center; }
        
        /* Naviqasiya */
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0f; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--gold); }
        .tab { display: none; } .active-tab { display: block; animation: fadeIn 0.5s ease; }
        
        /* Admin Cədvəli */
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: left; }
        th { color: var(--gold); }
        .admin-only { display: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #hp_secret { display: none; }
    </style>
</head>
<body>

<div id="hp_secret">
    <input type="text" id="hp_val" tabindex="-1" autocomplete="off">
</div>

<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h1 style="color:var(--gold); font-size: 42px; margin: 0; font-weight: 900;">NoirPRO</h1>
        <p style="opacity:0.6; font-size:13px; margin-bottom: 30px;">Kripto Qazanc Paneli</p>
        <input type="email" id="fp-email" placeholder="FaucetPay Email">
        <button class="btn" onclick="login()">DAXİL OL</button>
    </div>
</div>

<div id="app-content">
    <header>
        <span style="font-weight:900; color:var(--gold); font-size: 24px;">NoirPRO</span>
        <div class="bal-badge">💰 <span id="userBal">0.00</span> DGB</div>
    </header>

    <div class="container">
        <div id="home-tab" class="tab active-tab">
            <div class="card">
                <p style="opacity:0.6; font-size: 14px;">Növbəti claim üçün vaxt:</p>
                <h1 id="timer" style="color:var(--gold); font-size:70px; margin:10px 0; font-weight: 900;">--:--</h1>
                <div id="math-box">
                    <div class="math-text"><span id="n1">0</span> <span id="op">+</span> <span id="n2">0</span> = ?</div>
                    <input type="number" id="math-ans" class="math-input" placeholder="?">
                </div>
                <button id="claimBtn" class="btn" onclick="verifyAndClaim()" disabled>GÖZLƏYİN...</button>
            </div>
            <div class="card" style="padding:15px; font-size:12px; opacity:0.4;">REKLAM SAHƏSİ (A-ADS)</div>
        </div>

        <div id="earn-tab" class="tab">
            <div class="card">
                <h3 style="color:var(--gold); margin-top:0;">PTC ADS</h3>
                <div style="height:250px; background:#000; border-radius:20px; overflow:hidden; border:1px solid var(--border);">
                    <iframe src="SƏNİN_PTC_LİNKİN" style="width:100%; height:100%; border:none;"></iframe>
                </div>
            </div>
            <div class="card">
                <h3 style="color:var(--gold);">SHORTLINKS</h3>
                <p style="font-size:12px; opacity:0.6;">Linkləri keç, hər keçid üçün 0.10 DGB qazan</p>
                <button class="btn" onclick="window.location.href='SƏNİN_API_SHORTLINK_LİNKİN'" style="background:#222; color:var(--gold); border:1px solid var(--gold);">LİNKƏ KEÇ</button>
            </div>
        </div>

        <div id="wd-tab" class="tab">
            <div class="card">
                <h3>Mövcud Balans</h3>
                <h2 id="wdBal" style="color:var(--gold); font-size: 40px; margin: 15px 0;">0.00 DGB</h2>
                <button class="btn" onclick="requestWD()">ÖDƏNİŞ İSTƏ</button>
            </div>
        </div>

        <div id="admin-tab" class="tab">
            <div class="card" style="overflow-x: auto;">
                <h3 style="color:var(--gold);">ADMİN İDARƏETMƏ</h3>
                <table id="req-table">
                    <thead><tr><th>Email</th><th>Məbləğ</th><th>Əməl</th></tr></thead>
                    <tbody id="req-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showTab('home-tab', this)">🏠</div>
        <div class="nav-item" onclick="showTab('earn-tab', this)">🚀</div>
        <div class="nav-item" onclick="showTab('wd-tab', this)">💳</div>
        <div class="nav-item admin-only" id="admin-nav" onclick="showTab('admin-tab', this)">⚙️</div>
        <div class="nav-item" onclick="logout()">🚪</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Konfiqurasiya
const firebaseConfig = {
  apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs",
  authDomain: "faucetfirex.firebaseapp.com",
  projectId: "faucetfirex",
  storageBucket: "faucetfirex.firebasestorage.app",
  messagingSenderId: "191065358342",
  appId: "1:191065358342:web:b9911c6e71b9fc4b254387"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(), auth = firebase.auth();
let currentEmail = localStorage.getItem("fp_email");
let correctAns = 0, timerInterval = null;
let isTabActive = true, loadTime = Date.now();

const ADMIN_EMAIL = "xeyalemenov@gmail.com"; 

document.addEventListener("visibilitychange", () => { isTabActive = !document.hidden; });

async function login() {
    const email = document.getElementById('fp-email').value;
    if(!email.includes("@")) return alert("Səhv email!");
    localStorage.setItem("fp_email", email);
    await auth.signInAnonymously();
    location.reload();
}

function logout() { localStorage.clear(); auth.signOut(); location.reload(); }

auth.onAuthStateChanged(user => {
    if (user && currentEmail) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        if(currentEmail === ADMIN_EMAIL) {
            document.getElementById('admin-nav').style.display = 'block';
            loadAdminData();
        }
        db.collection("users").doc(currentEmail).onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('userBal').innerText = (data.tarazlıq || 0).toFixed(2);
                document.getElementById('wdBal').innerText = (data.tarazlıq || 0).toFixed(2) + " DGB";
                runTimer(data.son_faucet || 0);
            } else db.collection("users").doc(currentEmail).set({ tarazlıq: 0, son_faucet: 0 });
        });
    }
});

function runTimer(last) {
    if (timerInterval) clearInterval(timerInterval);
    const update = () => {
        const diff = (5 * 60 * 1000) - (Date.now() - last);
        const btn = document.getElementById('claimBtn'), txt = document.getElementById('timer'), box = document.getElementById('math-box');
        if (diff <= 0) {
            clearInterval(timerInterval);
            txt.innerText = "HAZIR"; btn.disabled = false; btn.innerText = "0.05 DGB GÖTÜR";
            box.style.display = "block"; if(correctAns === 0) generateMath();
        } else {
            btn.disabled = true; box.style.display = "none"; btn.innerText = "GÖZLEYİN...";
            const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
            txt.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    };
    update(); timerInterval = setInterval(update, 1000);
}

function generateMath() {
    const op = Math.random() > 0.5 ? '+' : '-';
    let n1 = Math.floor(Math.random() * 40) + 15, n2 = Math.floor(Math.random() * 15) + 5;
    correctAns = op === '+' ? n1 + n2 : n1 - n2;
    document.getElementById('n1').innerText = n1; document.getElementById('op').innerText = op; document.getElementById('n2').innerText = n2;
}

async function verifyAndClaim() {
    if(document.getElementById('hp_val').value !== "") return;
    if(Date.now() - loadTime < 4000) return alert("Sürətli hərəkət!");
    if(!isTabActive) return alert("Reklam pəncərəsində qalın!");

    const ans = parseInt(document.getElementById('math-ans').value);
    if (ans !== correctAns) { alert("Səhv cavab!"); generateMath(); return; }

    await db.collection("users").doc(currentEmail).update({ 
        tarazlıq: firebase.firestore.FieldValue.increment(0.05),
        son_faucet: Date.now() 
    });
    alert("Balans artırıldı!");
    correctAns = 0;
}

function loadAdminData() {
    db.collection("withdraw_requests").where("status", "==", "Gözləmədə").onSnapshot(snap => {
        const list = document.getElementById("req-list"); list.innerHTML = "";
        snap.forEach(doc => {
            list.innerHTML += `<tr><td>${doc.data().email}</td><td>${doc.data().miqdar}</td><td><button onclick="pay('${doc.id}')">ÖDƏ</button></td></tr>`;
        });
    });
}

async function pay(id) {
    if(confirm("Təsdiqləyirsən?")) await db.collection("withdraw_requests").doc(id).update({ status: "Ödənildi" });
}

async function requestWD() {
    const doc = await db.collection("users").doc(currentEmail).get();
    if(doc.data().tarazlıq < 10) return alert("Minimum 10 DGB!");
    await db.collection("withdraw_requests").add({ email: currentEmail, miqdar: doc.data().tarazlıq, status: "Gözləmədə", tarix: Date.now() });
    await db.collection("users").doc(currentEmail).update({ tarazlıq: 0 });
    alert("Sorğu göndərildi!");
}

function showTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active-tab'); el.classList.add('active');
}
</script>
</body>
</html>
