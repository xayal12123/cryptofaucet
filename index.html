<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirPRO — Şəxsi Kabinet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --gold: #FFC107; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: #0f0f18; padding: 30px; border-radius: 30px; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #181825; color: #fff; outline: none; box-sizing: border-box; }
        .btn { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 10px; font-size: 15px; }
        .btn:disabled { background: #1d1d2b; color: #444; }
        .toggle-link { margin-top: 15px; font-size: 13px; color: #8e8e9e; cursor: pointer; text-decoration: underline; }
        #app-content { display: none; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); align-items: center; }
        .bal-display { background: rgba(255,193,7,0.1); padding: 8px 15px; border-radius: 12px; color: var(--gold); font-weight: 800; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-container">
    <div class="card">
        <h1 style="color:var(--gold); margin:0 0 10px 0;">NoirPRO</h1>
        <h3 id="auth-title">Giriş</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Şifrə">
        <button class="btn" id="authBtn" onclick="handleAuth()">DAXİL OL</button>
        <div class="toggle-link" id="toggleLink" onclick="toggleMode()">Hesabın yoxdur? Qeydiyyatdan keç</div>
    </div>
</div>

<div id="app-content">
    <header>
        <span style="font-weight:900; color:var(--gold)">NoirPRO</span>
        <div class="bal-display">💰 <span id="userBal">0.00</span></div>
    </header>
    
    <div style="padding:20px; max-width:400px; margin:auto;">
        <div class="card">
            <p style="opacity:0.6; margin-bottom:5px;">Sənin Balansın</p>
            <h1 id="timer" style="color:var(--gold); font-size:50px; margin:10px 0;">05:00</h1>
            <button id="claimBtn" class="btn" onclick="doClaim()">10 TOKEN QAZAN</button>
            <button class="btn" style="background:transparent; color:#ff4444; border:1px solid #ff4444; margin-top:30px;" onclick="auth.signOut()">SİSTEMDƏN ÇIX</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
// FIREBASE AYARLARI
const firebaseConfig = {
  apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs",
  authDomain: "faucetfirex.firebaseapp.com",
  projectId: "faucetfirex",
  storageBucket: "faucetfirex.firebasestorage.app",
  messagingSenderId: "191065358342",
  appId: "1:191065358342:web:b9911c6e71b9fc4b254387"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let isLoginMode = true;
let lastClaimTime = 0;

// MODU DƏYİŞ (Giriş/Qeydiyyat)
function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('auth-title').innerText = isLoginMode ? "Giriş" : "Qeydiyyat";
    document.getElementById('authBtn').innerText = isLoginMode ? "DAXİL OL" : "HESAB YARAT";
    document.getElementById('toggleLink').innerText = isLoginMode ? "Hesabın yoxdur? Qeydiyyatdan keç" : "Artıq hesabın var? Giriş et";
}

// GİRİŞ VƏ QEYDİYYAT FUNKSİYASI
async function handleAuth() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    if(!email || !pass) return alert("Xanaları doldurun!");

    try {
        if(isLoginMode) {
            await auth.signInWithEmailAndPassword(email, pass);
        } else {
            await auth.createUserWithEmailAndPassword(email, pass);
        }
    } catch(e) {
        alert("Xəta: " + e.message);
    }
}

// İSTİFADƏÇİ STATUSUNA NƏZARƏT
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        
        // Hər istifadəçinin öz sənədinə (document) baxırıq
        db.collection("users").doc(user.uid).onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('userBal').innerText = (data.tarazlıq || 0).toFixed(2);
                lastClaimTime = data.son_İddia || 0;
                startTimer();
            } else {
                // Əgər bazada yoxdursa (yeni qeydiyyat), şəxsi hesabını yaradın
                db.collection("users").doc(user.uid).set({ tarazlıq: 0, son_İddia: 0 });
            }
        });
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app-content').style.display = 'none';
    }
});

// TOKEN QAZANMAQ
async function doClaim() {
    const user = auth.currentUser;
    if(!user) return;
    
    await db.collection("users").doc(user.uid).update({ 
        tarazlıq: firebase.firestore.FieldValue.increment(10), 
        son_İddia: Date.now() 
    });
}

// TAİMER FUNKSİYASI
function startTimer() {
    const countdown = setInterval(() => {
        const diff = (5 * 60 * 1000) - (Date.now() - lastClaimTime);
        const btn = document.getElementById('claimBtn');
        const txt = document.getElementById('timer');
        
        if (diff <= 0) {
            btn.disabled = false;
            txt.innerText = "HAZIR";
            clearInterval(countdown);
        } else {
            btn.disabled = true;
            const m = Math.floor(diff/60000);
            const s = Math.floor((diff%60000)/1000);
            txt.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }, 1000);
}
</script>
</body>
</html>
