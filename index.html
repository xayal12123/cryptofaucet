<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirPRO — Multi-Earning System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --gold: #FFC107; --card: #0f0f18; --text: #ffffff; --border: rgba(255,255,255,0.06); --green: #00E676; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.2s; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5,5,8,0.95); backdrop-filter: blur(12px); z-index: 100; }
        .bal-display { background: rgba(255,193,7,0.1); padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,193,7,0.2); font-weight: 900; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 15px; }
        .btn-main { background: var(--gold); color: #000; width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0f; display: flex; justify-content: space-around; padding: 22px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.3; color: white; }
        .nav-item.active { opacity: 1; color: var(--gold); }
        .tab { display: none; }
        .active-tab { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        iframe { width: 100%; height: 500px; border-radius: 15px; border: 1px solid var(--border); background: #000; margin-top: 10px; }
        input { width: 100%; padding: 12px; border-radius: 10px; background: #000; border: 1px solid var(--border); color: #fff; margin-bottom: 10px; outline: none; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }
    </style>
</head>
<body>

<div id="auth-screen" style="display: flex; height: 100vh; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: var(--card); padding: 40px; border-radius: 35px; text-align: center; width: 100%; max-width: 400px; border: 1px solid var(--border);">
        <h1 style="color: var(--gold); font-size: 32px; font-weight: 900; margin-bottom: 20px;">NoirPRO</h1>
        <input type="email" id="email-input" placeholder="Gmail ünvanınız">
        <button onclick="core.login()" class="btn-main">DAXİL OL</button>
    </div>
</div>

<div id="app-content" style="display: none;">
    <header>
        <h2 style="font-weight: 900; color: var(--gold);">NoirPRO</h2>
        <div class="bal-display">💰 <span id="user-bal">0.00</span></div>
    </header>

    <div class="container">
        <div id="earn-tab" class="tab active-tab">
            <div id="dynamic-ads-container">
                <p style="text-align:center; opacity:0.5; padding:20px;">Yüklənir...</p>
            </div>
        </div>

        <div id="short-tab" class="tab">
            <h4 style="margin-bottom:15px; color:var(--gold)">🔗 QISA LİNKLƏR</h4>
            <div id="shortlinks-list"></div>
        </div>

        <div id="wallet-tab" class="tab">
            <div class="card" style="text-align: center; padding: 40px 20px;">
                <p style="opacity: 0.5;">Balans</p>
                <h1 style="font-size: 48px; color: var(--gold); margin: 10px 0;" id="wd-bal">0.00</h1>
                <button class="btn-main" onclick="core.requestWD()">PUL ÇIXAR (MIN 10)</button>
            </div>
        </div>

        <div id="admin-tab" class="tab">
            <div class="card" style="border-color: var(--green);">
                <h4>📺 PTC/GWARD ƏLAVƏ ET</h4>
                <input type="text" id="adm-ad-title" placeholder="Reklam Adı">
                <input type="text" id="adm-ad-url" placeholder="Iframe Linki">
                <button class="btn-main" onclick="core.addAd()" style="background:var(--green)">ƏLAVƏ ET</button>
                <div id="adm-ads-manage" style="margin-top:10px;"></div>
            </div>

            <div class="card" style="border-color: var(--gold);">
                <h4>🔗 SHORTLINK ƏLAVƏ ET</h4>
                <input type="text" id="adm-sl-title" placeholder="Link Adı">
                <input type="text" id="adm-sl-url" placeholder="Qısa Link">
                <button class="btn-main" onclick="core.addSL()">ƏLAVƏ ET</button>
                <div id="adm-sl-manage" style="margin-top:10px;"></div>
            </div>

            <div class="card">
                <h4>💸 ÖDƏNİŞLƏR</h4>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>Gmail</th><th>Məbləğ</th><th>Əməl</th></tr></thead>
                        <tbody id="payout-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="core.switchTab('earn-tab', this)">🏠</div>
        <div class="nav-item" onclick="core.switchTab('short-tab', this)">🔗</div>
        <div class="nav-item" onclick="core.switchTab('wallet-tab', this)">💳</div>
        <div class="nav-item" id="admin-nav-btn" style="display:none" onclick="core.switchTab('admin-tab', this)">⚙️</div>
        <div class="nav-item" onclick="core.logout()">🚪</div>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
const core = {
    adminEmail: "xeyalemenov@gmail.com",
    config: { 
        apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs", 
        authDomain: "faucetfirex.firebaseapp.com", 
        projectId: "faucetfirex" 
    },

    init() {
        firebase.initializeApp(this.config);
        this.db = firebase.firestore();
        this.loadAll();
        this.checkAuth();
    },

    getDeviceID() {
        let id = localStorage.getItem('noir_id_v20');
        if(!id) { id = 'dev-' + Math.random().toString(36).substr(2, 9); localStorage.setItem('noir_id_v20', id); }
        return id;
    },

    async login() {
        const mail = document.getElementById('email-input').value.trim().toLowerCase();
        if(!mail.includes('@')) return alert("Səhv email!");
        const dev = this.getDeviceID();
        const userRef = this.db.collection("users").doc(mail);
        const doc = await userRef.get();
        if(doc.exists && doc.data().deviceID && doc.data().deviceID !== dev) return alert("Başqa cihaz qadağandır!");
        localStorage.setItem('noir_session', mail);
        await userRef.set({ email: mail, deviceID: dev }, { merge: true });
        location.reload();
    },

    loadAll() {
        // Dinamik PTC/Gward
        this.db.collection("dynamic_ads").onSnapshot(snap => {
            const cont = document.getElementById('dynamic-ads-container');
            const adm = document.getElementById('adm-ads-manage');
            cont.innerHTML = ""; if(adm) adm.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                cont.innerHTML += `<h4 style="margin:10px 0; color:var(--gold)">${d.title}</h4><iframe src="${d.url}"></iframe>`;
                if(adm) adm.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${d.title}</span><button onclick="core.del('dynamic_ads','${doc.id}')" style="color:red; background:none; border:none;">SİL</button></div>`;
            });
        });

        // Shortlinks
        this.db.collection("shortlinks").onSnapshot(snap => {
            const list = document.getElementById('shortlinks-list');
            const adm = document.getElementById('adm-sl-manage');
            list.innerHTML = ""; if(adm) adm.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;"><span>${d.title}</span><button class="btn-main" style="width:auto; padding:8px 15px;" onclick="window.location.href='${d.url}'">KEÇ</button></div>`;
                if(adm) adm.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${d.title}</span><button onclick="core.del('shortlinks','${doc.id}')" style="color:red; background:none; border:none;">SİL</button></div>`;
            });
        });
    },

    addAd() {
        const title = document.getElementById('adm-ad-title').value;
        const url = document.getElementById('adm-ad-url').value;
        if(title && url) this.db.collection("dynamic_ads").add({ title, url, date: Date.now() });
    },

    addSL() {
        const title = document.getElementById('adm-sl-title').value;
        const url = document.getElementById('adm-sl-url').value;
        if(title && url) this.db.collection("shortlinks").add({ title, url, date: Date.now() });
    },

    del(coll, id) { if(confirm("Silinsin?")) this.db.collection(coll).doc(id).delete(); },

    checkAuth() {
        const mail = localStorage.getItem('noir_session');
        if(mail) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            if(mail === this.adminEmail) {
                document.getElementById('admin-nav-btn').style.display = 'block';
                this.loadPayouts();
            }
            this.sync(mail);
        }
    },

    sync(mail) {
        this.db.collection("users").doc(mail).onSnapshot(doc => {
            if(doc.exists) {
                const b = doc.data().tarazlıq || 0;
                document.getElementById('user-bal').innerText = b.toFixed(2);
                document.getElementById('wd-bal').innerText = b.toFixed(2);
            }
        });
    },

    loadPayouts() {
        this.db.collection("withdraws").where("status", "==", "Gözləmədə").onSnapshot(snap => {
            const list = document.getElementById('payout-list'); list.innerHTML = "";
            snap.forEach(doc => {
                list.innerHTML += `<tr><td>${doc.data().email}</td><td>${doc.data().amount}</td><td><button onclick="core.payOk('${doc.id}')" style="color:var(--green); background:none; border:none; font-weight:bold;">ÖDƏ</button></td></tr>`;
            });
        });
    },

    async payOk(id) { if(confirm("Ödəniş təsdiqlənsin?")) await this.db.collection("withdraws").doc(id).update({ status: "Ödənildi" }); },

    async requestWD() {
        const mail = localStorage.getItem('noir_session');
        const doc = await this.db.collection("users").doc(mail).get();
        const b = doc.data().tarazlıq || 0;
        if(b >= 10) {
            await this.db.collection("withdraws").add({ email: mail, amount: b, status: "Gözləmədə", date: Date.now() });
            await this.db.collection("users").doc(mail).update({ tarazlıq: 0 });
            alert("Sorğu göndərildi!");
        } else alert("Minimum 10 DGB!");
    },

    switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
        document.getElementById(tab).classList.add('active-tab');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    },

    logout() { localStorage.clear(); location.reload(); }
};
core.init();
</script>
</body>
</html>
