<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirPRO — Professional Crypto Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #030305; --gold: #FFC107; --card: #0d0d14; --text: #f8f9fa; 
            --border: rgba(255,255,255,0.08); --green: #00E676; --red: #ff5252; --accent: #1a1a2b; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px; overflow-x: hidden; }
        
        /* UI Components */
        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(3,3,5,0.9); backdrop-filter: blur(25px); z-index: 1000; }
        .logo { font-size: 26px; font-weight: 900; color: var(--gold); letter-spacing: -1.5px; }
        .bal-display { background: linear-gradient(135deg, rgba(255,193,7,0.1), rgba(255,193,7,0.05)); padding: 12px 22px; border-radius: 20px; border: 1px solid rgba(255,193,7,0.3); font-weight: 800; color: var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .container { max-width: 550px; margin: auto; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 35px; border: 1px solid var(--border); margin-bottom: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); position: relative; }
        
        .tab { display: none; }
        .active-tab { display: block; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-main { background: linear-gradient(135deg, var(--gold), #FF8F00); color: #000; width: 100%; padding: 20px; border: none; border-radius: 22px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; box-shadow: 0 10px 25px rgba(255,143,0,0.25); }
        .btn-main:active { transform: scale(0.96); }
        
        input { width: 100%; padding: 18px; border-radius: 20px; background: #000; border: 1px solid var(--border); color: #fff; margin-bottom: 15px; outline: none; font-size: 15px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(13,13,20,0.98); display: flex; justify-content: space-around; padding: 25px; border-top: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 1000; }
        .nav-item { font-size: 28px; cursor: pointer; opacity: 0.2; transition: 0.4s; filter: grayscale(1); }
        .nav-item.active { opacity: 1; filter: grayscale(0); transform: translateY(-12px); color: var(--gold); }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 18px 10px; font-size: 13px; border-bottom: 1px solid var(--border); }

        .ad-slot { text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.01); border-radius: 30px; border: 1px dashed var(--border); min-height: 250px; }
        #ab-mask { display: none; position: fixed; inset: 0; background: rgba(3,3,5,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
    </style>
</head>
<body>

<div id="ab-mask">
    <div class="card" style="border-color: var(--red);">
        <h1>🛑</h1>
        <h2>ADBLOCK AKTİVDİR</h2>
        <p style="opacity: 0.6; margin: 15px 0;">Davam etmək üçün AdBlock-u söndürün.</p>
        <button class="btn-main" onclick="location.reload()">YENİLƏ</button>
    </div>
</div>

<div id="auth-screen" style="display: flex; height: 100vh; align-items: center; justify-content: center; padding: 30px;">
    <div class="card" style="width: 100%; max-width: 440px; text-align: center; padding: 60px 40px;">
        <h1 style="color: var(--gold); font-size: 45px; font-weight: 900; margin-bottom: 5px;">NoirPRO</h1>
        <input type="email" id="email-input" placeholder="FaucetPay Email">
        <button onclick="core.login()" class="btn-main">SİSTEMƏ DAXİL OL</button>
    </div>
</div>

<div id="app-content" style="display: none;">
    <header>
        <div class="logo">NoirPRO</div>
        <div class="bal-display"><span id="user-bal">0.00</span> DGB</div>
    </header>

    <div class="container">
        <div id="live-ticker" style="font-size: 12px; color: var(--gold); margin-bottom: 30px; text-align: center; font-weight: 800; text-transform: uppercase;">💎 DATA STREAMING...</div>

        <div id="earn-tab" class="tab active-tab">
            <div class="ad-slot">
                <script type="text/javascript">
                    atOptions = {'key' : 'ce9f3ff8e460bb52746fb436002a70fe', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {}};
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/ce9f3ff8e460bb52746fb436002a70fe/invoke.js"></script>
            </div>
            <div class="card">
                <h3>🏆 TOP EARNERS</h3>
                <table><tbody id="home-leaderboard"></tbody></table>
            </div>
        </div>

        <div id="short-tab" class="tab">
            <h3 id="sl-title" style="color: var(--gold); margin-bottom: 25px;">🔗 AVAILABLE LINKS</h3>
            <div id="sl-container"></div>
        </div>

        <div id="ptc-tab" class="tab">
            <h3 style="color: var(--green); margin-bottom: 25px;">🎯 PAID TO CLICK</h3>
            <div id="ptc-container"></div>
        </div>

        <div id="offer-tab" class="tab">
            <h3 style="color: var(--gold); margin-bottom: 25px;">🎁 OFFERWALLS</h3>
            <div id="offer-frame-container"></div>
        </div>

        <div id="wallet-tab" class="tab">
            <div class="card" style="text-align: center; padding: 50px 25px;">
                <p style="opacity: 0.5;">Available Balance</p>
                <h1 style="font-size: 70px; color: var(--gold); font-weight: 900; margin: 15px 0;" id="wd-bal">0.00</h1>
                <button class="btn-main" onclick="core.requestWD()">WITHDRAW NOW (MIN 5 DGB)</button>
            </div>
            <div class="card">
                <h4>📜 TRANSACTION HISTORY</h4>
                <table><tbody id="user-history"></tbody></table>
            </div>
        </div>

        <div id="admin-tab" class="tab">
            <div class="card" style="border-color: var(--red);">
                <h4 style="color:var(--red); margin-bottom:20px;">⚙️ ADMIN PANEL</h4>
                <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:20px; margin-bottom:15px;">
                    <p style="font-size:12px; margin-bottom:10px;">Add Shortlink API:</p>
                    <input type="text" id="adm-sl-t" placeholder="Title">
                    <input type="text" id="adm-sl-tk" placeholder="Earnow API Token">
                    <button class="btn-main" style="padding:12px;" onclick="core.saveSL()">SAVE LINK</button>
                </div>
                <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:20px;">
                    <p style="font-size:12px; margin-bottom:10px;">Add PTC Ad:</p>
                    <input type="text" id="adm-ptc-t" placeholder="Title">
                    <input type="text" id="adm-ptc-u" placeholder="URL">
                    <input type="number" id="adm-ptc-r" placeholder="Reward DGB">
                    <input type="number" id="adm-ptc-s" placeholder="Timer (Sec)">
                    <button class="btn-main" style="padding:12px;" onclick="core.savePTC()">SAVE PTC</button>
                </div>
                <button class="btn-main" style="margin-top:20px; background:var(--red); color:#fff;" onclick="core.massFake()">1000 FAKE USERS</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="core.switchTab('earn-tab', this)">🏠</div>
        <div class="nav-item" onclick="core.switchTab('short-tab', this)">🔗</div>
        <div class="nav-item" onclick="core.switchTab('ptc-tab', this)">🎯</div>
        <div class="nav-item" onclick="core.switchTab('offer-tab', this)">🎁</div>
        <div class="nav-item" onclick="core.switchTab('wallet-tab', this)">💳</div>
        <div id="admin-nav" class="nav-item" style="display:none" onclick="core.switchTab('admin-tab', this)">⚙️</div>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
const core = {
    adminEmail: "xeyalemenov@gmail.com",
    config: { apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs", authDomain: "faucetfirex.firebaseapp.com", projectId: "faucetfirex" },

    init() {
        firebase.initializeApp(this.config);
        this.db = firebase.firestore();
        this.checkAuth();
        this.autoRefreshLoop();
        this.checkAdBlock();
    },

    async login() {
        const m = document.getElementById('email-input').value.trim().toLowerCase();
        if(!m.includes('@')) return alert("Səhv email!");
        localStorage.setItem('noir_session', m);
        await this.db.collection("users").doc(m).set({ email: m, last_seen: Date.now() }, { merge: true });
        location.reload();
    },

    checkAuth() {
        const m = localStorage.getItem('noir_session');
        if(m) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            if(m === this.adminEmail) document.getElementById('admin-nav').style.display = 'block';
            this.sync(m);
            this.loadContent();
            this.loadOffer(m);
        }
    },

    sync(m) {
        this.db.collection("users").doc(m).onSnapshot(doc => {
            const b = doc.exists ? (doc.data().tarazlıq || 0) : 0;
            document.getElementById('user-bal').innerText = b.toFixed(2);
            document.getElementById('wd-bal').innerText = b.toFixed(2);
        });
        this.db.collection("withdraws").where("email", "==", m).orderBy("date", "desc").onSnapshot(snap => {
            document.getElementById('user-history').innerHTML = snap.docs.map(doc => `<tr><td>${doc.data().amount.toFixed(2)} DGB</td><td style="color:var(--gold)">${doc.data().status}</td></tr>`).join('');
        });
    },

    async loadContent() {
        const m = localStorage.getItem('noir_session');
        const user = await this.db.collection("users").doc(m).get();
        const doneSL = user.data().completed_today || [];
        const donePTC = user.data().completed_ptc || [];
        const today = new Date().toLocaleDateString();

        if(user.data().last_reset !== today) {
            await this.db.collection("users").doc(m).update({ completed_today: [], completed_ptc: [], last_reset: today });
        }

        // Shortlinks (Limit 5)
        this.db.collection("shortlinks").limit(10).onSnapshot(snap => {
            const avail = snap.docs.filter(d => !doneSL.includes(d.id)).slice(0, 5);
            document.getElementById('sl-title').innerText = `🔗 AVAILABLE LINKS (${avail.length})`;
            document.getElementById('sl-container').innerHTML = avail.map(doc => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${doc.data().title}</b>
                    <button class="btn-main" style="width:auto; padding:10px 20px;" onclick="core.openSL('${doc.data().url}', '${doc.id}')">CLAIM</button>
                </div>
            `).join('') || "<p style='text-align:center; opacity:0.3;'>No links available.</p>";
        });

        // PTC Ads
        this.db.collection("ptc_ads").onSnapshot(snap => {
            const availP = snap.docs.filter(d => !donePTC.includes(d.id));
            document.getElementById('ptc-container').innerHTML = availP.map(doc => `
                <div class="card" style="border-left: 4px solid var(--green);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><b>${doc.data().title}</b><br><small>${doc.data().reward} DGB | ${doc.data().timer}s</small></div>
                        <button class="btn-main" style="width:auto; padding:10px 15px;" onclick="core.openPTC('${doc.id}', '${doc.data().url}', ${doc.data().timer}, ${doc.data().reward})">WATCH</button>
                    </div>
                </div>
            `).join('');
        });
        this.loadLeaders();
    },

    openSL(token, lid) {
        const m = localStorage.getItem('noir_session');
        const rid = Math.floor(Math.random()*9999);
        const succ = window.location.origin + `/success.html?uid=${m}&lid=${lid}&rid=${rid}`;
        window.open(`https://earnow.online/st?api=${token}&url=${encodeURIComponent(succ)}`, '_blank');
    },

    openPTC(id, url, timer, reward) {
        const m = localStorage.getItem('noir_session');
        window.location.href = `view-ptc.html?uid=${m}&lid=${id}&url=${encodeURIComponent(url)}&t=${timer}&r=${reward}`;
    },

    loadOffer(m) {
        const url = `https://www.cpalead.com/mobile/locker.php?id=YOUR_ID&uid=${m}`;
        document.getElementById('offer-frame-container').innerHTML = `<iframe src="${url}" style="width:100%; height:600px; border:none; border-radius:30px;"></iframe>`;
    },

    autoRefreshLoop() {
        setInterval(() => {
            if(document.getElementById('earn-tab').classList.contains('active-tab')) {
                this.loadContent();
                this.updateTicker();
            }
        }, 40000);
    },

    async updateTicker() {
        try {
            const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=digibyte&vs_currencies=usd');
            const d = await r.json();
            document.getElementById('live-ticker').innerText = `🔥 DGB Price: $${d.digibyte.usd} | NOIRPRO ENGINE ACTIVE`;
        } catch(e) {}
    },

    async savePTC() {
        const t = document.getElementById('adm-ptc-t').value;
        const u = document.getElementById('adm-ptc-u').value;
        const r = parseFloat(document.getElementById('adm-ptc-r').value);
        const s = parseInt(document.getElementById('adm-ptc-s').value);
        await this.db.collection("ptc_ads").add({ title:t, url:u, reward:r, timer:s, date: Date.now() });
        alert("PTC Added!");
    },

    async saveSL() {
        const t = document.getElementById('adm-sl-t').value;
        const tk = document.getElementById('adm-sl-tk').value;
        await this.db.collection("shortlinks").add({ title:t, url:tk, date: Date.now() });
        alert("SL Added!");
    },

    async massFake() {
        for (let i = 0; i < 1000; i++) {
            let m = "u" + Math.floor(Math.random()*9999) + "@noir.pro";
            let b = parseFloat((Math.random()*1500).toFixed(2));
            await this.db.collection("fake_users").doc(m).set({ tarazlıq: b });
        }
        alert("1000 Users Generated!");
    },

    async loadLeaders() {
        const rS = await this.db.collection("users").orderBy("tarazlıq", "desc").limit(3).get();
        const fS = await this.db.collection("fake_users").orderBy("tarazlıq", "desc").limit(7).get();
        let res = "";
        rS.forEach(d => res += `<tr><td>${d.id.substring(0,3)}***@</td><td style="color:var(--green); font-weight:800;">${(d.data().tarazlıq || 0).toFixed(2)}</td></tr>`);
        fS.forEach(d => res += `<tr><td>${d.id.substring(0,3)}***@</td><td style="color:var(--green); font-weight:800;">${(d.data().tarazlıq || 0).toFixed(2)}</td></tr>`);
        document.getElementById('home-leaderboard').innerHTML = res;
    },

    async requestWD() {
        const m = localStorage.getItem('noir_session');
        const d = await this.db.collection("users").doc(m).get();
        const b = d.data().tarazlıq || 0;
        if(b >= 5) {
            await this.db.collection("withdraws").add({ email:m, amount:b, status:"Gözləmədə", date:Date.now() });
            await this.db.collection("users").doc(m).update({ tarazlıq:0 });
            alert("Sorğu göndərildi!");
        } else alert("Minimum 5 DGB!");
    },

    switchTab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
        document.getElementById(id).classList.add('active-tab');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'short-tab') this.loadContent();
    },

    checkAdBlock() {
        setTimeout(() => {
            const ad = document.querySelector('.ad-slot');
            if(window.getComputedStyle(ad).display === "none") document.getElementById('ab-mask').style.display='flex';
        }, 4000);
    },

    logout() { localStorage.removeItem('noir_session'); location.reload(); }
};
core.init();
</script>
</body>
</html>
