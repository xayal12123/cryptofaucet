<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirPRO — Pro Fast (10 DGB Min)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --gold: #FFC107; --card: #0f0f18; --text: #ffffff; --border: rgba(255,255,255,0.06); --green: #00E676; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.2s; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5,5,8,0.95); backdrop-filter: blur(12px); z-index: 100; }
        .bal-display { background: rgba(255,193,7,0.1); padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,193,7,0.2); font-weight: 900; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: var(--card); padding: 25px; border-radius: 35px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .btn-main { background: var(--gold); color: #000; width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .offer-frame { height: 450px; background: #000; border-radius: 25px; border: 1px solid var(--border); overflow: hidden; margin-top: 15px; }
        .ptc-frame { height: 200px; background: #000; border-radius: 25px; border: 1px dashed var(--gold); overflow: hidden; margin-top: 15px; }
        .table-wrapper { overflow-x: auto; margin-top: 15px; border-radius: 15px; background: #000; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--gold); text-transform: uppercase; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0f; display: flex; justify-content: space-around; padding: 22px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { font-size: 26px; cursor: pointer; opacity: 0.3; }
        .nav-item.active { opacity: 1; color: var(--gold); }
        #admin-nav-btn { display: none; }
        .tab { display: none; }
        .active-tab { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-screen" style="display: flex; height: 100vh; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: var(--card); padding: 45px; border-radius: 40px; text-align: center; width: 100%; max-width: 400px; border: 1px solid var(--border);">
        <h1 style="color: var(--gold); font-size: 42px; font-weight: 900;">NoirPRO</h1>
        <input type="email" id="email-input" placeholder="Email ünvanınızı daxil edin" style="width: 100%; padding: 18px; border-radius: 15px; background: #000; border: 1px solid var(--border); color: #fff; margin: 25px 0; text-align: center; outline: none;">
        <button onclick="core.login()" class="btn-main">DAXİL OL</button>
    </div>
</div>

<div id="app-content" style="display: none;">
    <header>
        <h2 style="font-weight: 900; color: var(--gold);">NoirPRO</h2>
        <div class="bal-display">💰 <span id="user-bal">0.00</span></div>
    </header>

    <div class="container">
        <div id="earn-tab" class="tab active-tab">
            <div class="card" style="border-color: rgba(0, 230, 118, 0.3);">
                <h3 style="color: var(--green);">📲 YÜKLƏ VƏ QAZAN</h3>
                <div class="offer-frame"><iframe src="SƏNİN_OFFERWALL_LİNKİN" style="width:100%; height:100%; border:none;"></iframe></div>
            </div>
            <div class="card">
                <h3 style="color: var(--gold);">📺 REKLAM İZLƏ</h3>
                <div class="ptc-frame"><iframe src="SƏNİN_PTC_LİNKİN" style="width:100%; height:100%; border:none;"></iframe></div>
            </div>
        </div>

        <div id="wallet-tab" class="tab">
            <div class="card" style="text-align: center; padding: 50px 20px;">
                <p style="opacity: 0.5;">Cari Balansınız</p>
                <h1 style="font-size: 55px; color: var(--gold); margin: 15px 0;" id="wd-bal">0.00</h1>
                <button class="btn-main" onclick="core.requestWD()">ÖDƏNİŞ İSTƏ (MIN 10)</button>
                <p style="font-size: 11px; color: var(--gold); opacity: 0.5; margin-top: 10px;">* Minimum çıxarış limiti 10 DGB təyin edilib.</p>
            </div>
        </div>

        <div id="admin-tab" class="tab">
            <div class="card">
                <h4>💳 ÖDƏNİŞ GÖZLƏYƏNLƏR</h4>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>Email</th><th>Məbləğ</th><th>Əməl</th></tr></thead>
                        <tbody id="payout-list"></tbody>
                    </table>
                </div>
            </div>

            <div class="card" style="border-color: var(--green);">
                <h4 style="color: var(--green);">✅ TAMAMLANMIŞ ÖDƏNİŞLƏR</h4>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>Email</th><th>Məbləğ</th><th>Status</th></tr></thead>
                        <tbody id="history-list"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h4>👥 İSTİFADƏÇİ BAZASI</h4>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>Email</th><th>Balans</th></tr></thead>
                        <tbody id="user-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="core.switchTab('earn-tab', this)">🏠</div>
        <div class="nav-item" onclick="core.switchTab('wallet-tab', this)">💳</div>
        <div class="nav-item" id="admin-nav-btn" onclick="core.switchTab('admin-tab', this)">⚙️</div>
        <div class="nav-item" onclick="core.logout()">🚪</div>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
const core = {
    adminEmail: "xeyalemenov@gmail.com",
    adminDeviceId: localStorage.getItem('noir_admin_token'),
    config: { 
        apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs", 
        authDomain: "faucetfirex.firebaseapp.com", 
        projectId: "faucetfirex" 
    },

    init() {
        firebase.initializeApp(this.config);
        this.db = firebase.firestore();
        this.auth = firebase.auth();
        this.checkAuth();
    },

    login() {
        const mail = document.getElementById('email-input').value.trim().toLowerCase();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(emailRegex.test(mail)) { 
            localStorage.setItem('noir_session', mail); 
            this.auth.signInAnonymously().then(() => {
                this.db.collection("users").doc(mail).set({ email: mail }, { merge: true }).then(() => location.reload());
            });
        } else { alert("Düzgün email daxil edin."); }
    },

    logout() { localStorage.clear(); location.reload(); },

    checkAuth() {
        const mail = localStorage.getItem('noir_session');
        this.auth.onAuthStateChanged(user => {
            if(user && mail) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                if(mail === this.adminEmail) this.verifyDevice();
                this.sync(mail);
            }
        });
    },

    verifyDevice() {
        const currentToken = btoa(navigator.userAgent + screen.width);
        if (!this.adminDeviceId) { localStorage.setItem('noir_admin_token', currentToken); this.adminDeviceId = currentToken; }
        if (this.adminDeviceId === currentToken) { document.getElementById('admin-nav-btn').style.display = 'block'; this.loadAdminPanel(); }
    },

    sync(mail) {
        this.db.collection("users").doc(mail).onSnapshot(doc => {
            const bal = doc.exists ? (doc.data().tarazlıq || 0) : 0;
            document.getElementById('user-bal').innerText = bal.toFixed(2);
            document.getElementById('wd-bal').innerText = bal.toFixed(2);
            if(!doc.exists) this.db.collection("users").doc(mail).set({email: mail, tarazlıq: 0});
        });
    },

    loadAdminPanel() {
        this.db.collection("withdraw_requests").where("status", "==", "Gözləmədə").onSnapshot(snap => {
            const list = document.getElementById('payout-list'); list.innerHTML = "";
            snap.forEach(doc => {
                list.innerHTML += `<tr><td>${doc.data().email}</td><td>${doc.data().amount.toFixed(2)}</td><td><button style="padding:5px; background:var(--green); border:none; border-radius:5px; font-weight:900;" onclick="core.approve('${doc.id}')">ÖDƏ</button></td></tr>`;
            });
        });

        this.db.collection("withdraw_requests").where("status", "==", "Ödənildi").orderBy("date", "desc").limit(10).onSnapshot(snap => {
            const hist = document.getElementById('history-list'); hist.innerHTML = "";
            snap.forEach(doc => {
                hist.innerHTML += `<tr><td>${doc.data().email}</td><td>${doc.data().amount.toFixed(2)}</td><td style="color:var(--green)">Ödənildi</td></tr>`;
            });
        });

        this.db.collection("users").onSnapshot(snap => {
            const list = document.getElementById('user-list'); list.innerHTML = "";
            snap.forEach(doc => { list.innerHTML += `<tr><td>${doc.id}</td><td>${(doc.data().tarazlıq || 0).toFixed(2)}</td></tr>`; });
        });
    },

    async approve(id) { 
        if(confirm("Bu ödənişi təsdiqləyirsiz?")) {
            await this.db.collection("withdraw_requests").doc(id).update({ 
                status: "Ödənildi",
                date: Date.now()
            }); 
        }
    },

    async requestWD() {
        const mail = localStorage.getItem('noir_session');
        const doc = await this.db.collection("users").doc(mail).get();
        const bal = doc.data().tarazlıq || 0;
        // Limit 10 DGB olaraq dəyişdirildi
        if(bal >= 10) {
            await this.db.collection("withdraw_requests").add({ email: mail, amount: bal, status: "Gözləmədə", date: Date.now() });
            await this.db.collection("users").doc(mail).update({ tarazlıq: 0 });
            alert("Sorğu göndərildi!");
        } else { alert("Minimum 10 DGB lazımdır."); }
    },

    switchTab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
        document.getElementById(id).classList.add('active-tab');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
};
core.init();
</script>
</body>
</html>
