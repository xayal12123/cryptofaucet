<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirPRO Faucet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --card: #0f0f18; --gold: #FFC107; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 70px; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        #app-content { display: none; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; text-align: center; margin: 20px; }
        .btn { background: #FFC107; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; }
        .btn:disabled { background: #1d1d2b; color: #444; }
        header { padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0f; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .tab-content { display: none; } .active { display: block; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card" style="width:320px">
        <h1 style="color:var(--gold)">NoirPRO</h1>
        <button class="btn" onclick="auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider())">GOOGLE İLƏ GİRİŞ</button>
    </div>
</div>

<div id="app-content">
    <header>
        <span style="font-weight:900; color:var(--gold)">NoirPRO</span>
        <span style="font-weight:800">💰 <span id="userBal">0.00</span></span>
    </header>

    <div id="faucet" class="tab-content active">
        <div class="card">
            <h3>Manual Claim</h3>
            <h1 id="timer" style="color:var(--gold); font-size:45px">05:00</h1>
            <button id="claimBtn" class="btn" onclick="doClaim()">GÖTÜR</button>
        </div>
    </div>

    <div id="ptc" class="tab-content">
        <div class="card">
            <h3>PTC Ads</h3>
            <div id="ptc-list"></div>
        </div>
    </div>

    <div class="nav">
        <span onclick="showTab('faucet')">🏠 GÖTÜR</span>
        <span onclick="showTab('ptc')">👁️ PTC</span>
        <span onclick="auth.signOut().then(()=>location.reload())">🚪 ÇIXIŞ</span>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs",
  authDomain: "faucetfirex.firebaseapp.com",
  projectId: "faucetfirex",
  storageBucket: "faucetfirex.firebasestorage.app",
  messagingSenderId: "191065358342",
  appId: "1:191065358342:web:b9911c6e71b9fc4b254387"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let lastTime = 0;

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        db.collection("istifadəçilər").doc(user.uid).onSnapshot(doc => {
            if (doc.exists) {
                const d = doc.data();
                document.getElementById('userBal').innerText = (d.tarazlıq || 0).toFixed(2);
                lastTime = d.son_İddia || 0;
                startTimer();
            } else {
                db.collection("istifadəçilər").doc(user.uid).set({ tarazlıq: 0, son_İddia: 0 });
            }
        });
    }
});

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'ptc') renderPTC();
}

function renderPTC() {
    const ads = [{n: "Bonus Ad", r: 20, s: 10, u: "REKLAM_LİNKİ"}];
    document.getElementById('ptc-list').innerHTML = ads.map(a => `
        <div style="display:flex; justify-content:space-between; margin-top:10px; padding:10px; background:rgba(255,255,255,0.02); border-radius:10px">
            <span style="font-size:12px">${a.n}<br><small style="color:var(--gold)">+${a.r} Token</small></span>
            <button class="btn" style="width:auto; padding:5px 15px" onclick="window.open('${a.u}'); addRew(${a.r})">İZLƏ</button>
        </div>`).join('');
}

async function addRew(v) { await db.collection("istifadəçilər").doc(auth.currentUser.uid).update({ tarazlıq: firebase.firestore.FieldValue.increment(v) }); }

async function doClaim() {
    await db.collection("istifadəçilər").doc(auth.currentUser.uid).update({ tarazlıq: firebase.firestore.FieldValue.increment(10), son_İddia: Date.now() });
}

function startTimer() {
    setInterval(() => {
        const diff = (5 * 60 * 1000) - (Date.now() - lastTime);
        const btn = document.getElementById('claimBtn');
        const txt = document.getElementById('timer');
        if (diff <= 0) { btn.disabled = false; txt.innerText = "HAZIR"; }
        else {
            btn.disabled = true;
            const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
            txt.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }, 1000);
}
</script>

<script src="https://pl29329349.profitablecpmratenetwork.com/aa/69/69/aa696903b4f2d1329390ab3ebd1dc84a.js"></script>

</body>
</html>
