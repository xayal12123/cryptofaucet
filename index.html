<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirFaucet PRO — Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.07);
            --gold: #FFC107;
            --text: #EDEDF3;
            --muted: #9a9aab;
            --grad: linear-gradient(135deg, #FFC107, #FF6F00);
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 5, 8, 0.8);
        }

        .logo { font-weight: 900; font-size: 20px; color: var(--gold); text-transform: uppercase; letter-spacing: -1px; }
        .logo span { color: #fff; font-weight: 400; }

        .balance-badge {
            background: rgba(255, 193, 7, 0.1);
            padding: 8px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 193, 7, 0.2);
            font-weight: 800; color: var(--gold);
        }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; width: 100%; flex: 1; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(20px);
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .timer-display {
            font-size: 55px; font-weight: 900; margin: 20px 0;
            background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-main {
            background: var(--grad); border: none; padding: 20px; width: 100%;
            border-radius: 18px; font-weight: 900; font-size: 16px; color: #000;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 111, 0, 0.2);
        }
        .btn-main:disabled { background: #1a1a24; color: #444; box-shadow: none; cursor: not-allowed; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 15, 0.95);
            display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }
        
        .nav-item { color: var(--muted); text-decoration: none; font-size: 10px; text-align: center; opacity: 0.6; font-weight: 700; }
        .nav-item.active { color: var(--gold); opacity: 1; }

        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        input {
            width: 100%; background: #1a1a24; border: 1px solid var(--border);
            padding: 16px; border-radius: 14px; color: #fff; margin-bottom: 15px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card" style="width: 100%; max-width: 380px;">
        <h1 style="color:var(--gold); margin-bottom: 10px;">NoirFaucet</h1>
        <p style="color:var(--muted); margin-bottom: 30px;">Kripto qazanmağa başlamaq üçün giriş edin</p>
        <button class="btn-main" onclick="login()">GOOGLE İLƏ GİRİŞ</button>
    </div>
</div>

<header>
    <div class="logo">Noir<span>PRO</span></div>
    <div class="balance-badge">💰 <span id="topBalance">0.00</span></div>
</header>

<div class="container">
    <div id="faucet" class="tab-content active">
        <div class="card">
            <h2 style="margin-top:0">Manual Claim</h2>
            <p style="color:var(--muted); font-size: 13px;">Hər 5 dəqiqədən bir balansını artır</p>
            <div class="timer-display" id="faucetTimer">05:00</div>
            <button class="btn-main" id="claimBtn" onclick="handleClaim()" disabled>TOKENLƏRİ GÖTÜR</button>
            <p id="statusMsg" style="font-size: 11px; color: var(--muted); margin-top: 15px;">Məlumatlar senkronizə edilir...</p>
        </div>
    </div>
    
    <div id="withdraw" class="tab-content">
        <div class="card">
            <h2>Çıxarış</h2>
            <p style="color:var(--muted); font-size: 13px; margin-bottom: 20px;">Minimal çıxarış: 50.00 Token</p>
            <input type="email" id="wallet" placeholder="FaucetPay Email">
            <button class="btn-main" onclick="alert('Sorğu qəbul edildi! 24 saat ərzində yoxlanılacaq.')">ÖDƏNİŞ TƏLƏB ET</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-item active" onclick="showTab('faucet', this)">🏠<br>HOME</a>
    <a href="#" class="nav-item" onclick="showTab('withdraw', this)">💳<br>WITHDRAW</a>
    <a href="#" class="nav-item" onclick="logout()">🚪<br>LOGOUT</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script src="https://pl29329349.profitablecpmratenetwork.com/aa/69/69/aa696903b4f2d1329390ab3ebd1dc84a.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs",
  authDomain: "faucetfirex.firebaseapp.com",
  projectId: "faucetfirex",
  storageBucket: "faucetfirex.firebasestorage.app",
  messagingSenderId: "191065358342",
  appId: "1:191065358342:web:b9911c6e71b9fc4b254387"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser = null;

// Giriş Funksiyası
async function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
        await auth.signInWithPopup(provider);
    } catch (e) { alert("Xəta: " + e.message); }
}

function logout() {
    auth.signOut().then(() => location.reload());
}

// Auth Müşahidəçisi
auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('auth-screen').style.display = 'none';
        
        // Sənin bazandakı "tarazlıq" və "son_İddia" sahələrinə uyğunlaşdırılıb
        db.collection("users").doc(user.uid).onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                const bal = (data.tarazlıq || 0).toFixed(2);
                document.getElementById('topBalance').innerText = bal;
                updateTimer(data.son_İddia || 0);
                document.getElementById('statusMsg').innerText = "Sistem Aktivdir ✅";
            } else {
                // Yeni istifadəçini sənin sahə adlarınla yaradırıq
                db.collection("users").doc(user.uid).set({ 
                    tarazlıq: 0, 
                    son_İddia: 0 
                });
            }
        });
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
    }
});

// Timer İdarəetməsi
function updateTimer(lastClaim) {
    const btn = document.getElementById('claimBtn');
    const display = document.getElementById('faucetTimer');
    const tick = () => {
        const now = Date.now();
        const diff = (5 * 60 * 1000) - (now - lastClaim);
        if (diff <= 0) {
            btn.disabled = false;
            display.innerText = "READY";
            display.style.color = "var(--gold)";
        } else {
            btn.disabled = true;
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            display.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            setTimeout(tick, 1000);
        }
    };
    tick();
}

// Token Götürmə Funksiyası
async function handleClaim() {
    try {
        await db.collection("users").doc(currentUser.uid).update({
            tarazlıq: firebase.firestore.FieldValue.increment(10),
            son_İddia: Date.now()
        });
        window.navigator.vibrate(50);
    } catch (e) { alert("Xəta: " + e.message); }
}

// Tab dəyişdirici
function showTab(id, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}
</script>
</body>
</html>
