<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoirPRO — Premium DGB Faucet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --gold: #FFC107; --card: #0f0f18; --text: #fff; --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: var(--card); padding: 40px 30px; border-radius: 35px; width: 100%; max-width: 380px; border: 1px solid var(--border); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        input { width: 100%; padding: 16px; margin: 15px 0; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: #12121f; color: #fff; outline: none; text-align: center; font-size: 15px; }
        #app-content { display: none; }
        
        header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5,5,8,0.9); backdrop-filter: blur(12px); z-index: 1000; }
        .bal-badge { background: rgba(255,193,7,0.1); padding: 8px 16px; border-radius: 14px; color: var(--gold); font-weight: 800; border: 1px solid rgba(255,193,7,0.2); }
        
        .container { max-width: 480px; margin: auto; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border); margin-bottom: 18px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .btn { background: linear-gradient(135deg, #FFC107, #FF8F00); color: #000; border: none; padding: 18px; width: 100%; border-radius: 18px; font-weight: 900; cursor: pointer; font-size: 16px; box-shadow: 0 10px 20px rgba(255,193,7,0.2); }
        .btn:disabled { background: #1d1d2b; color: #444; box-shadow: none; cursor: not-allowed; opacity: 0.5; }
        
        /* Riyazi Kapça Dizaynı */
        #math-box { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 25px; margin: 15px 0; border: 1px dashed var(--border); display: none; }
        .math-text { font-size: 32px; font-weight: 900; color: var(--gold); margin-bottom: 12px; letter-spacing: 2px; }
        .math-input { width: 140px; font-size: 22px; font-weight: bold; border: 2px solid var(--gold); background: #000; margin-top: 10px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0f; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { font-size: 24px; cursor: pointer; opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--gold); }
        
        .tab { display: none; } .active-tab { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h1 style="color:var(--gold); font-size: 42px; margin: 0; font-weight: 900; letter-spacing: -1px;">NoirPRO</h1>
        <p style="opacity:0.6; font-size:13px; margin-bottom: 30px;">Kripto Qazanmağa Başla</p>
        <input type="email" id="fp-email" placeholder="FaucetPay Emailiniz">
        <button class="btn" onclick="login()">GİRİŞ ET</button>
    </div>
</div>

<div id="app-content">
    <header>
        <span style="font-weight:900; color:var(--gold); font-size: 24px;">NoirPRO</span>
        <div class="bal-badge">💰 <span id="userBal">0.00</span> DGB</div>
    </header>

    <div class="container">
        <div id="home-tab" class="tab active-tab">
            <div class="card">
                <p style="opacity:0.6; font-size: 14px; margin-top:0;">Növbəti qazanc üçün vaxt:</p>
                <h1 id="timer" style="color:var(--gold); font-size:70px; margin:10px 0; font-weight: 900;">05:00</h1>
                
                <div id="math-box">
                    <p style="font-size:12px; opacity:0.5; margin-bottom: 10px;">HESABLAYIN:</p>
                    <div class="math-text"><span id="n1">0</span> <span id="op">+</span> <span id="n2">0</span> = ?</div>
                    <input type="number" id="math-ans" class="math-input" placeholder="?">
                </div>
                
                <button id="claimBtn" class="btn" onclick="verifyAndClaim()">0.05 DGB GÖTÜR</button>
            </div>
            <div class="card" style="padding: 15px; font-size: 12px; opacity: 0.4;">
                Reklam Sahəsi (Adsterra)
            </div>
        </div>

        <div id="wd-tab" class="tab">
            <div class="card">
                <h3 style="margin-top:0;">Balansdan Çıxarış</h3>
                <p style="font-size:13px; opacity:0.6;">Minimum limit: 10 DGB</p>
                <h2 id="wdBal" style="color:var(--gold); font-size: 40px; margin: 20px 0; font-weight: 900;">0.00 DGB</h2>
                <button class="btn" onclick="requestWD()">ÖDƏNİŞ İSTƏ</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showTab('home-tab', this)">🏠</div>
        <div class="nav-item" onclick="showTab('wd-tab', this)">💳</div>
        <div class="nav-item" onclick="logout()">🚪</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics-compat.js"></script>

<script>
// Sənin Firebase Konfiqurasiyan
const firebaseConfig = {
  apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs",
  authDomain: "faucetfirex.firebaseapp.com",
  projectId: "faucetfirex",
  storageBucket: "faucetfirex.firebasestorage.app",
  messagingSenderId: "191065358342",
  appId: "1:191065358342:web:b9911c6e71b9fc4b254387",
  measurementId: "G-4MFS9HC7ME"
};

// Başlatma
firebase.initializeApp(firebaseConfig);
firebase.analytics();
const db = firebase.firestore(), auth = firebase.auth();

let currentEmail = localStorage.getItem("fp_email");
let correctAns = 0;

// Orta Səviyyəli Riyazi Sual Yaradıcı
function generateMath() {
    const ops = ['+', '-'];
    const op = ops[Math.floor(Math.random() * ops.length)];
    let num1, num2;

    if (op === '+') {
        num1 = Math.floor(Math.random() * 40) + 10; 
        num2 = Math.floor(Math.random() * 30) + 5;
        correctAns = num1 + num2;
    } else {
        num1 = Math.floor(Math.random() * 60) + 30; 
        num2 = Math.floor(Math.random() * 25) + 5;
        correctAns = num1 - num2;
    }

    document.getElementById('n1').innerText = num1;
    document.getElementById('op').innerText = op;
    document.getElementById('n2').innerText = num2;
    document.getElementById('math-ans').value = "";
}

async function login() {
    const email = document.getElementById('fp-email').value;
    if(!email.includes("@")) return alert("Zəhmət olmasa düzgün email daxil edin!");
    localStorage.setItem("fp_email", email);
    await auth.signInAnonymously();
    location.reload();
}

function logout() { localStorage.clear(); auth.signOut(); location.reload(); }

auth.onAuthStateChanged(user => {
    if (user && currentEmail) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        db.collection("users").doc(currentEmail).onSnapshot(doc => {
            if (doc.exists) {
                const bal = doc.data().tarazlıq || 0;
                document.getElementById('userBal').innerText = bal.toFixed(2);
                document.getElementById('wdBal').innerText = bal.toFixed(2) + " DGB";
                updateTimer(doc.data().son_faucet || 0);
            } else db.collection("users").doc(currentEmail).set({ tarazlıq: 0, son_faucet: 0 });
        });
    }
});

async function verifyAndClaim() {
    const userAns = document.getElementById('math-ans').value;
    if (!userAns) return alert("Sualı cavablandırın!");
    
    if (parseInt(userAns) !== correctAns) {
        alert("Səhv cavab! Bir daha cəhd edin.");
        generateMath();
        return;
    }

    try {
        await db.collection("users").doc(currentEmail).update({ 
            tarazlıq: firebase.firestore.FieldValue.increment(0.05),
            son_faucet: Date.now() 
        });
        alert("Təbriklər! 0.05 DGB balansınıza əlavə edildi.");
        generateMath();
    } catch (e) { alert("Xəta baş verdi, yenidən yoxlayın."); }
}

async function requestWD() {
    const doc = await db.collection("users").doc(currentEmail).get();
    const bal = doc.data().tarazlıq || 0;
    if(bal < 10) return alert("Minimum 10 DGB balansınız olmalıdır!");
    
    await db.collection("withdraw_requests").add({ 
        email: currentEmail, 
        miqdar: bal, 
        tarix: new Date().toLocaleString(),
        status: "Gözləmədə" 
    });
    
    await db.collection("users").doc(currentEmail).update({ tarazlıq: 0 });
    alert("Ödəniş istəyiniz göndərildi!");
}

function showTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active-tab');
    el.classList.add('active');
}

function updateTimer(last) {
    const tick = setInterval(() => {
        const diff = (5 * 60 * 1000) - (Date.now() - last);
        const btn = document.getElementById('claimBtn'), txt = document.getElementById('timer'), mBox = document.getElementById('math-box');
        
        if (diff <= 0) { 
            btn.disabled = false; 
            txt.innerText = "HAZIR"; 
            mBox.style.display = "block";
            if(correctAns === 0) generateMath();
            clearInterval(tick); 
        } else { 
            btn.disabled = true; 
            mBox.style.display = "none";
            const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
            txt.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }, 1000);
}
</script>
</body>
</html>
