<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uğurlu Keçid — NoirPRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030305; --gold: #FFC107; --card: #0d0d14; --text: #f8f9fa; --green: #00E676; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
            text-align: center;
        }
        .container { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 40px; 
            border: 2px solid var(--gold); 
            box-shadow: 0 20px 50px rgba(255, 193, 7, 0.1);
            max-width: 400px;
            width: 90%;
        }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { color: var(--gold); font-weight: 900; margin-bottom: 10px; }
        p { opacity: 0.7; margin-bottom: 30px; }
        .reward { 
            font-size: 24px; 
            font-weight: 800; 
            color: var(--green); 
            background: rgba(0, 230, 118, 0.1); 
            padding: 15px; 
            border-radius: 20px; 
            display: inline-block;
            margin-bottom: 30px;
        }
        .btn {
            background: var(--gold);
            color: #000;
            padding: 15px 30px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 900;
            display: block;
            transition: 0.3s;
        }
        #status-msg { font-size: 12px; margin-top: 15px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🏆</div>
    <h1>Təbriklər!</h1>
    <p>Qısa link uğurla tamamlandı.</p>
    <div class="reward" id="reward-display">+0.30 DGB</div>
    
    <a href="index.html" class="btn">ANA SƏHİFƏYƏ QAYIT</a>
    <div id="status-msg">Balans yenilənir, xahiş olunur gözləyin...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 FİREBASE AYARLARI (index.html ilə eyni olmalıdır)
const firebaseConfig = {
    apiKey: "AIzaSyDy-I6C7r9Js_OZqPlSj__d-bYGB-c0yXs",
    authDomain: "faucetfirex.firebaseapp.com",
    projectId: "faucetfirex"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🧠 BALANS YENİLƏMƏ MƏNTİQİ
async function processReward() {
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');     // İstifadəçi email
    const lid = urlParams.get('lid');     // Link ID
    const reward = parseFloat(urlParams.get('reward')) || 0.30;

    const statusMsg = document.getElementById('status-msg');

    if (!uid || !lid) {
        statusMsg.innerText = "Xəta: Məlumat tapılmadı!";
        statusMsg.style.color = "red";
        return;
    }

    try {
        // 1. İstifadəçinin balansını artır
        const userRef = db.collection("users").doc(uid);
        await userRef.update({
            tarazlıq: firebase.firestore.FieldValue.increment(reward)
        });

        // 2. Bu linkin tamamlandığını tarixçəyə yaz (Opsional, amma təhlükəsizlik üçün yaxşıdır)
        await db.collection("transactions").add({
            email: uid,
            link_id: lid,
            amount: reward,
            type: "shortlink",
            date: Date.now()
        });

        statusMsg.innerText = "Mükafat balansınıza əlavə edildi! ✅";
        statusMsg.style.color = "#00E676";
        document.getElementById('reward-display').innerText = "+" + reward.toFixed(2) + " DGB";

    } catch (error) {
        console.error("Xəta baş verdi:", error);
        statusMsg.innerText = "Sistem xətası! Mükafat yüklənmədi.";
        statusMsg.style.color = "red";
    }
}

// Səhifə açılan kimi mükafatı hesabla
window.onload = processReward;
</script>

</body>
</html>
